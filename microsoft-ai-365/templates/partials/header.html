<header class="site-header">
  <div class="site-header-inner">
    <div class="brand">
      <span class="brand-logo">
        <span></span><span></span><span></span><span></span>
      </span>
      <div class="brand-text">
        <span class="brand-name">Microsoft <span class="ai365">AI 365</span></span>
        <span class="brand-tag">{{ site_tagline }}</span>
      </div>
    </div>
    <div class="header-tools">
      <span class="header-date">{{ today_str }}</span>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">◐</button>
    </div>
  </div>
</header>

<div class="cat-nav-wrap">
  <nav class="cat-nav">
    <a href="#" class="active">All <span class="num">{{ total_today }}</span></a>
    <span class="sep"></span>
    <span class="cat-nav-section-label ms">Microsoft</span>
    {% for cat in ms_categories %}
    <a href="#cat-{{ loop.index }}">{{ cat }} <span class="num">{{ category_counts[cat] }}</span></a>
    {% endfor %}
    <span class="sep"></span>
    <span class="cat-nav-section-label">Partner</span>
    <a href="#openai" class="openai-tab">OpenAI <span class="num">{{ category_counts['OpenAI'] }}</span></a>
    <a href="#anthropic" class="anthropic-tab">Anthropic <span class="num">{{ category_counts['Anthropic'] }}</span></a>
  </nav>
</div>
